services:
  - type: web
    name: ssbikez-erp
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py create_default_superuser"
    startCommand: "gunicorn ssbikez.wsgi --log-file -"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ssbikez-erp.onrender.com,localhost
      - key: DATABASE_URL
        fromDatabase:
          name: ssbikez-db
          property: connectionString

databases:
  - name: ssbikez-db
    plan: free
