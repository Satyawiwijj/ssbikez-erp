{% extends 'base.html' %}
{% block title %}Update Reminder — SSBikez ERP{% endblock %}
{% block page_title %}Update Reminder{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Update Reminder SR-{{ reminder.pk }}</h1>
  <a href="{% url 'service:reminder_list' %}" class="btn btn-ghost">&#8592; Back</a>
</div>
<div class="card" style="max-width:400px;">
  <form method="post">{% csrf_token %}
    <div class="form-group">
      <label class="form-label">Status</label>
      <select name="status" class="form-control">
        {% for val, label in reminder.Status.choices %}
        <option value="{{ val }}" {% if reminder.status == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea name="notes" rows="3" class="form-control">{{ reminder.notes }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
  </form>
</div>
{% endblock %}
