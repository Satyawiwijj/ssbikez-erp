{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card form-card">
  <div class="card-header"><span class="card-title">&#x25; {{ title }}</span></div>
  <form method="post" novalidate style="padding:20px;">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="form-error">{{ field.errors }}</div>{% endif %}
      </div>
    {% endfor %}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'service:discount_master_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
