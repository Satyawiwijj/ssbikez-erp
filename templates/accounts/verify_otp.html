<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP — SSBikez ERP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(90deg,#b9cbf4,#e7eaf5,#b9cbf4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .brand {
      font-size: 28px;
      font-weight: 800;
      color: #0f1b35;
    }
    .login-wrapper { width: 100%; max-width: 400px; }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .brand { font-size: 28px; font-weight: 700; color: #2563EB; letter-spacing: -0.5px; }
    .login-logo .tagline { font-size: 13px; color: #6B7280; margin-top: 4px; }
    .login-card {
      background: #fff;
      border-radius: 20px;
      border: 1.5px solid #eaeff8;
      box-shadow: 0 12px 40px rgba(15,27,53,0.08);
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
    }
    .login-card h1 { font-size: 24px; font-weight: 800; color:  #0f1b35; margin-bottom: 8px; }
    .login-card p { font-size: 13.5px; color: #8a93a8; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .otp-side-design { position: absolute; inset: 0; pointer-events: none;}
    .circle { position: absolute; border-radius: 50%;}
    .circle-1 {
      width: 180px;
      height: 180px;
      background: rgba(37,99,235,0.08);
      top: -60px;
      right: -60px;
    }
    .circle-2 {
      width: 140px;
      height: 140px;
      background: rgba(124,58,237,0.06);
      bottom: -50px;
      left: -50px;
    }
    .side-icon {
      position: absolute;
      bottom: -10px;
      right: -10px;
      font-size: 90px;
      color: rgba(15,27,53,0.04);
    }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      background: #f8faff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      font-size: 24px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      color: #0f1b35;
      text-align: center;
      letter-spacing: 6px;
      font-size: 24px;
    }
    input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .messages {
      background: #FEE2E2;
      border: 1px solid #FCA5A5;
      border-radius: 8px;
      padding: 10px 14px;
      color: #991B1B;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .btn-login {
      width: 100%;
      background: #2563EB;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #1D4ED8; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: #6B7280; }
    .back-link { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #2563EB; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-logo">
    <div class="brand">
    <i class="fas fa-motorcycle me-2"></i>
    SSBikez ERP
  </div>
    <div class="tagline">Two-Factor Authentication</div>
  </div>

  <div class="login-card">
    <div class="otp-side-design">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <i class="fas fa-shield-alt side-icon"></i>
    </div>
    <h1>Verify OTP</h1>
    <p>Please enter the 6-digit code sent to your registered email.</p>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}{{ message }}<br>{% endfor %}
    </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="id_otp_code">OTP Code</label>
        <input type="text" name="otp_code" id="id_otp_code" autofocus autocomplete="off" required maxlength="6">
      </div>
      <button type="submit" class="btn-login">Verify Authentication</button>
    </form>
    
    <a href="{% url 'accounts:login' %}" class="back-link">&larr; Back to Login</a>
  </div>

  <div class="login-footer">SSBikez ERP &copy; 2025</div>
</div>
</body>
</html>
