<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP — SSBikez ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F3F4F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-wrapper { width: 100%; max-width: 400px; }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .brand { font-size: 28px; font-weight: 700; color: #2563EB; letter-spacing: -0.5px; }
    .login-logo .tagline { font-size: 13px; color: #6B7280; margin-top: 4px; }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 36px 32px;
    }
    .login-card h1 { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 6px; }
    .login-card p { font-size: 13.5px; color: #6B7280; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      color: #111827;
      text-align: center;
      letter-spacing: 4px;
      font-size: 24px;
    }
    input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .messages {
      background: #FEE2E2;
      border: 1px solid #FCA5A5;
      border-radius: 8px;
      padding: 10px 14px;
      color: #991B1B;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .btn-login {
      width: 100%;
      background: #2563EB;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #1D4ED8; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: #9CA3AF; }
    .back-link { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #2563EB; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-logo">
    <div class="brand">SSBikez ERP</div>
    <div class="tagline">Two-Factor Authentication</div>
  </div>

  <div class="login-card">
    <h1>Verify OTP</h1>
    <p>Please enter the 6-digit code sent to your device.</p>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}{{ message }}<br>{% endfor %}
    </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="id_otp_code">OTP Code</label>
        <input type="text" name="otp_code" id="id_otp_code" autofocus autocomplete="off" required maxlength="6">
      </div>
      <button type="submit" class="btn-login">Verify Authentication</button>
    </form>
    
    <a href="{% url 'accounts:login' %}" class="back-link">&larr; Back to Login</a>
  </div>

  <div class="login-footer">SSBikez ERP &copy; 2025</div>
</div>
</body>
</html>
