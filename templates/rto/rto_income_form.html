{% extends 'base.html' %}
{% block title %}RTO Income — RTO-{{ reg.pk }}{% endblock %}
{% block page_title %}RTO Income for RTO-{{ reg.pk }}{% endblock %}
{% block content %}
<nav class="breadcrumb-bar">
  <a href="{% url 'rto:registration_detail' reg.pk %}">RTO-{{ reg.pk }}</a>
  <span class="bc-sep">/</span><span class="bc-current">Add Income</span>
</nav>
<div class="card form-card">
  <div style="padding:20px;">
    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
      </div>
      {% endfor %}
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Income</button>
        <a href="{% url 'rto:registration_detail' reg.pk %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
